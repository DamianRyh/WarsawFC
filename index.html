# WARSAW FC — index.html (v5 TV)

Poniżej wklej cały kod do pliku `index.html` w GitHub.

```html
<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WARSAW FC Matchday Base</title>
<style>
body{margin:0;background:#050507;color:#fff;font-family:Arial,sans-serif}
.container{padding:24px}
.panel{background:#0d0d12;border:1px solid #1f1f29;border-radius:20px;padding:20px;margin-bottom:20px}
button{background:#fff;color:#000;border:none;padding:12px 18px;border-radius:12px;font-weight:700;cursor:pointer}
button.secondary{background:#17171f;color:#fff}
.grid{display:grid;gap:18px}
.grid-3{grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}
.match{background:#111118;border-radius:18px;padding:18px;text-align:center;border:1px solid #222}
.timer{font-size:96px;font-weight:900;text-align:center}
.table{width:100%;border-collapse:collapse}
.table td,.table th{padding:12px;border-bottom:1px solid #1d1d27;text-align:left}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.tag{padding:8px 14px;border-radius:999px;background:#111118;border:1px solid #1f1f29}
.tv-layout{display:grid;grid-template-columns:2fr 1fr;gap:20px}
@media(max-width:900px){.tv-layout{grid-template-columns:1fr}.timer{font-size:56px}}
</style>
</head>
<body>
<div class="container">
<div class="topbar">
<div>
<h1>WE ARE WARSAW FC</h1>
<p>ZAWSZE TU. ZAWSZE RAZEM.</p>
</div>
<div class="tag">[ S03E13 ]</div>
</div>

<div class="panel">
<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px">
<button onclick="showTV()">TRYB TV</button>
<button class="secondary" onclick="showEdit()">EDYCJA</button>
</div>
</div>

<div id="tvView">
<div class="panel">
<div style="display:flex;justify-content:space-between;align-items:center">
<div>
<h2>AKTUALNA KOLEJKA</h2>
<h1 id="roundLabel">1 / 12</h1>
</div>
<div class="timer" id="timer">05:00</div>
</div>
</div>

<div class="tv-layout">
<div>
<div class="panel">
<h2>TERAZ GRAJĄ</h2>
<div class="grid grid-3" id="currentMatches"></div>
</div>

<div class="panel">
<h2>TABELA LIVE</h2>
<table class="table">
<thead>
<tr>
<th>#</th>
<th>TEAM</th>
<th>PKT</th>
<th>BR</th>
</tr>
</thead>
<tbody id="standings"></tbody>
</table>
</div>
</div>

<div>
<div class="panel">
<h2>NASTĘPNA KOLEJKA</h2>
<div id="nextMatches"></div>
</div>

<div class="panel">
<h2>LISTA STRZELCÓW</h2>
<div id="scorers"></div>
</div>
</div>
</div>
</div>
</div>

<script>
const matches=[
['WFC 1','WFC 2','Boisko nr 1'],
['WFC 3','WFC 4','Boisko nr 2'],
['WFC 5','WFC 6','Boisko nr 3']
]

const next=[
['WFC 1 vs WFC 3'],
['WFC 2 vs WFC 5'],
['WFC 4 vs WFC 6']
]

const table=[
{team:'WFC 1',pts:9,gd:5},
{team:'WFC 3',pts:7,gd:3},
{team:'WFC 2',pts:6,gd:1},
{team:'WFC 5',pts:4,gd:0},
{team:'WFC 6',pts:3,gd:-2},
{team:'WFC 4',pts:1,gd:-7}
]

const scorers=[
{name:'Bartosz Piwiński',goals:8},
{name:'Karol Machulski',goals:6},
{name:'Fernando Morales',goals:5},
{name:'Damian Gawrych',goals:4},
{name:'Hubert Majewski',goals:4}
]

function render(){
currentMatches.innerHTML=matches.map(m=>`
<div class="match">
<h3>${m[2]}</h3>
<h1>${m[0]}</h1>
<div>VS</div>
<h1>${m[1]}</h1>
</div>`).join('')

nextMatches.innerHTML=next.map(m=>`
<div class="match" style="margin-bottom:12px">
${m[0]}
</div>`).join('')

standings.innerHTML=table.map((t,i)=>`
<tr>
<td>${i+1}</td>
<td>${t.team}</td>
<td>${t.pts}</td>
<td>${t.gd>0?'+':''}${t.gd}</td>
</tr>`).join('')

scorers.innerHTML=scorers.map((s,i)=>`
<div style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #1d1d27">
<div>#${i+1} ${s.name}</div>
<strong>${s.goals}</strong>
</div>`).join('')
}

let sec=300
setInterval(()=>{
if(sec>0){
sec--
const m=String(Math.floor(sec/60)).padStart(2,'0')
const s=String(sec%60).padStart(2,'0')
document.getElementById('timer').innerText=`${m}:${s}`
}
},1000)

function showTV(){
document.body.style.background='#000'
}

function showEdit(){
alert('Tutaj później dodamy pełny panel edycji LIVE.')
}

render()
</script>
</body>
</html>
```
